    <title>CreConnect – Creator Brand Collaboration</title>
    <meta name="description" content="Join a community where brands and creators collaborate seamlessly." />
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('cc-theme');
          var theme = saved || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
          if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
        } catch (e) {}
      })();
    </script>
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0b0a12;
        transition: opacity 0.4s ease;
      }
      html[data-theme="light"] #app-splash {
        background: #ffffff;
      }
      #app-splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #app-splash svg { width: 420px; height: 320px; max-width: 90vw; }
      #splash-dark { display: flex; }
      #splash-light { display: none; }
      html[data-theme="light"] #splash-dark { display: none; }
      html[data-theme="light"] #splash-light { display: flex; }
    </style>

          <!-- ===== C LOGO (reform, flip to opposite directions, interlock) ===== -->

              <animateTransform attributeName="transform" type="rotate" dur="4.8s" repeatCount="indefinite" fill="freeze" keyTimes="0;0.36;0.56;1" values="0 38 0;0 38 0;-180 38 0;-180 38 0"/>
              <path d="M -6.1 -34.5 A 56 56 0 1 1 -6.1 34.5" fill="none" stroke="url(#cgrad)" stroke-width="22" stroke-linecap="round"/>

            <g>
              <animateTransform attributeName="transform" type="rotate" dur="4.8s" repeatCount="indefinite" fill="freeze" keyTimes="0;0.36;0.56;1" values="0 -38 0;0 -38 0;180 -38 0;180 -38 0"/>

            <g clip-path="url(#weaveTop)" opacity="0">
              <animate attributeName="opacity" dur="4.8s" repeatCount="indefinite" fill="freeze" keyTimes="0;0.54;0.62;1" values="0;0;1;1"/>
              <path d="M 82.1 -34.5 A 56 56 0 1 0 82.1 34.5" fill="none" stroke="#F6F3FF" stroke-width="32" stroke-linecap="round"/>
              <path d="M 82.1 -34.5 A 56 56 0 1 0 82.1 34.5" fill="none" stroke="url(#cgrad)" stroke-width="22" stroke-linecap="round"/>
            </g>
          </g>

          <!-- ember + shockwave at collision -->
          <g opacity="0">
            <animate attributeName="opacity" dur="4.8s" repeatCount="indefinite" fill="freeze" keyTimes="0;0.25;0.29;0.42;1" values="0;0;1;0;0"/>
            <animateTransform attributeName="transform" type="scale" dur="4.8s" repeatCount="indefinite" fill="freeze" keyTimes="0;0.25;0.42;1" values="0.2 0.2;0.2 0.2;2.2 2.2;2.2 2.2"/>

              <circle cx="-14" cy="-16" r="3.4"/><circle cx="16" cy="-10" r="2.8"/><circle cx="-18" cy="8" r="3"/>
              <circle cx="12" cy="16" r="3.4"/><circle cx="0" cy="-23" r="2.6"/><circle cx="4" cy="23" r="3"/>

          </g>
          <circle r="10" fill="none" stroke="url(#gold)" stroke-width="5" opacity="0">

            <animateTransform attributeName="transform" type="scale" dur="4.8s" repeatCount="indefinite" fill="freeze" keyTimes="0;0.25;0.42;1" values="0.3 0.3;0.3 0.3;3.6 3.6;3.6 3.6"/>
          </circle>
        </g>

        <g opacity="0">
          <animate attributeName="opacity" dur="4.8s" repeatCount="indefinite" fill="freeze" keyTimes="0;0.66;0.80;1" values="0;0;1;1"/>
          <animateTransform attributeName="transform" type="translate" dur="4.8s" repeatCount="indefinite" fill="freeze" keyTimes="0;0.66;0.80;1" values="0 16;0 16;0 0;0 0"/>
          <text x="0" y="128" font-size="46" font-weight="700" letter-spacing="-1.5" text-anchor="middle">

        <rect x="-70" y="160" width="140" height="4" rx="2" fill="#E7E3F5" opacity="0">

        </rect>
        <rect x="-70" y="160" width="140" height="4" rx="2" fill="url(#cgrad)" opacity="0">

          <animateTransform attributeName="transform" type="scale" additive="sum" dur="4.8s" repeatCount="indefinite" fill="freeze" keyTimes="0;1" values="0 1;1 1"/>

      </svg>
    </div>
    <div id="root"></div>
    <script>
      window.addEventListener('load', function () {
        setTimeout(function () {
          var splash = document.getElementById('app-splash');
          if (!splash) return;
          splash.classList.add('fade-out');
          setTimeout(function () { splash.remove(); }, 400);
        }, 4800);
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('error', function(e) {
        var el = document.getElementById('js-error-display');
        if (!el) {
          el = document.createElement('div');
          el.id = 'js-error-display';
          el.style.cssText = 'position:fixed;inset:0;z-index:99999;background:#0a0b14;color:#f2f4fb;font-family:monospace;padding:2rem;overflow:auto;';
          document.body.appendChild(el);
        }
        el.innerHTML = '<h2 style="color:#f0445f;margin-bottom:1rem;">⚠ JavaScript Error</h2><pre style="background:#12131f;padding:1rem;border-radius:8px;white-space:pre-wrap;color:#f2f4fb;border:1px solid rgba(240,68,95,0.4);">' + e.message + '\n\n' + (e.error && e.error.stack ? e.error.stack : '') + '\nFile: ' + e.filename + ':' + e.lineno + '</pre>';
      });
      window.addEventListener('unhandledrejection', function(e) {
        var el = document.getElementById('js-error-display');
        if (!el) {
          el = document.createElement('div');
          el.id = 'js-error-display';
          el.style.cssText = 'position:fixed;inset:0;z-index:99999;background:#0a0b14;color:#f2f4fb;font-family:monospace;padding:2rem;overflow:auto;';
          document.body.appendChild(el);
        }
        el.innerHTML = '<h2 style="color:#f0445f;margin-bottom:1rem;">⚠ Unhandled Promise Rejection</h2><pre style="background:#12131f;padding:1rem;border-radius:8px;white-space:pre-wrap;color:#f2f4fb;border:1px solid rgba(240,68,95,0.4);">' + (e.reason && e.reason.message ? e.reason.message : String(e.reason)) + '\n\n' + (e.reason && e.reason.stack ? e.reason.stack : '') + '</pre>';
      });
    </script>
  </body>
