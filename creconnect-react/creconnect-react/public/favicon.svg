<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="favicon-bg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#13142B" />
      <stop offset="1" stop-color="#0A0B14" />
    </linearGradient>
    <linearGradient id="favicon-mark" x1="8" y1="8" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A594FF" />
      <stop offset="1" stop-color="#7C5CFF" />
    </linearGradient>
    <clipPath id="favicon-clip">
      <circle cx="24" cy="13" r="6.5" />
    </clipPath>
  </defs>
  <rect width="48" height="48" rx="12" fill="url(#favicon-bg)" />

  <!-- Foreground C - opens left -->
  <path
    d="M 6.76 15.99 A 13 13 0 1 1 6.76 32.01"
    stroke="#F2F4FB"
    stroke-width="5"
    stroke-linecap="round"
  />

  <!-- Violet C - opens right -->
  <path
    d="M 41.24 15.99 A 13 13 0 1 0 41.24 32.01"
    stroke="url(#favicon-mark)"
    stroke-width="5"
    stroke-linecap="round"
  />

  <!-- Weave: violet passes over the foreground C at the top crossing -->
  <g clip-path="url(#favicon-clip)">
    <path d="M 41.24 15.99 A 13 13 0 1 0 41.24 32.01" stroke="#13142B" stroke-width="9" stroke-linecap="round" />
    <path d="M 41.24 15.99 A 13 13 0 1 0 41.24 32.01" stroke="url(#favicon-mark)" stroke-width="5" stroke-linecap="round" />
  </g>
</svg>
